name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Build
        run: npm run build
        env:
          CI: true
          # Desativa ESLint no build — avisos são dívida técnica existente (brownfield).
          # Remover esta linha após resolver as issues listadas em docs/engineering/TESTING.md.
          DISABLE_ESLINT_PLUGIN: true
          # Variáveis do Firebase — configure em Settings > Secrets > Actions do repositório
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}

  test:
    name: Testes + Cobertura
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes com cobertura
        run: npm test -- --watchAll=false --ci --coverage --coverageReporters=lcov --coverageReporters=text-summary
        env:
          CI: true

      - name: Publicar relatório de cobertura como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report
          if-no-files-found: ignore
